name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Download prebuilts (all ABIs)
        run: |
          TAG=$(curl -fsSL "https://api.github.com/repos/Sakura-Fubuki76/mpv-android/releases/latest" | grep '"tag_name"' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          bash scripts/download-prebuilds.sh --tag "$TAG" arm64-v8a
          bash scripts/download-prebuilds.sh --tag "$TAG" armeabi-v7a
          bash scripts/download-prebuilds.sh --tag "$TAG" x86
          bash scripts/download-prebuilds.sh --tag "$TAG" x86_64

      - name: Decode keystore
        uses: timheuer/base64-to-file@v1
        id: keystore
        with:
          fileName: 'keystore.jks'
          encodedString: ${{ secrets.KEYSTORE }}

      - name: Build all ABIs
        run: >
          ./gradlew assembleRelease
          -PRELEASE_STORE_FILE=${{ steps.keystore.outputs.filePath }}
          -PRELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          -PRELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          -PRELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v6
        with:
          name: yume-arm64-v8a
          path: app/build/outputs/apk/release/*-arm64-v8a-*.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v6
        with:
          name: yume-armeabi-v7a
          path: app/build/outputs/apk/release/*-armeabi-v7a-*.apk

      - name: Upload x86 APK
        uses: actions/upload-artifact@v6
        with:
          name: yume-x86
          path: app/build/outputs/apk/release/*-x86-*.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v6
        with:
          name: yume-x86_64
          path: app/build/outputs/apk/release/*-x86_64-*.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v6
        with:
          name: yume-universal
          path: app/build/outputs/apk/release/*-universal-*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
