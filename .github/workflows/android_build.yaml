name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK and run checks
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true
          gradle-home-cache-cleanup: true

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew assembleDebug

      - name: Run local tests
        run: ./gradlew test

      - name: Lint checks
        run: ./gradlew ktlintCheck

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: yume-arm64-v8a-debug
          path: app/build/outputs/apk/debug/*-arm64-v8a-*.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          name: yume-armeabi-v7a-debug
          path: app/build/outputs/apk/debug/*-armeabi-v7a-*.apk

      - name: Upload x86 APK
        uses: actions/upload-artifact@v7
        with:
          name: yume-x86-debug
          path: app/build/outputs/apk/debug/*-x86-*.apk

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: yume-x86_64-debug
          path: app/build/outputs/apk/debug/*-x86_64-*.apk

      - name: Upload universal APK
        uses: actions/upload-artifact@v7
        with:
          name: yume-universal-debug
          path: app/build/outputs/apk/debug/*-universal-*.apk

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports
          path: app/build/reports
